  - rule-id: "M7-3-6"
    query-id: "cpp/autosar/using-declarations-used-in-header-files"
    justification:
      "The using declarations are used for backwards compatibility. The old
      arene::foo implementations have been moved to arene::base::foo, which are
      now accessed by #include <arene/base/foo.hpp> rather than #include
      <arene/foo.hpp>. The backwards compatibility headers are accessed by the
      old names #include <arene/foo.hpp> and used to reintroduce the names back
      to the arene namespace, so that existing code doesn't need to change.
      These headers are the only place these names are introduced into the arene
      namespace."
    code-identifier: CODEQLDEV(M7-3-6-back-compat)
